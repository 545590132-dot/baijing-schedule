<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白鲸社群排期表</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--secondary:#0ea5e9;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--bg:#f0f4ff;--card-bg:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--shadow:0 4px 16px rgba(37,99,235,.08);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* AUTH */
#auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#0ea5e9 100%)}
.auth-card{background:#fff;border-radius:20px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo h1{font-size:22px;font-weight:700;color:var(--primary);line-height:1.4}
.auth-logo .whale{font-size:44px;display:block;margin-bottom:8px}
.auth-tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text-muted);transition:all .2s;user-select:none}
.auth-tab.active{background:#fff;color:var(--primary);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.form-input:focus{border-color:var(--primary)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.auth-tip{text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px}
.auth-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}

/* TOPBAR */
#app-page{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.topbar-title{font-size:18px;font-weight:700;color:var(--primary)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.user-badge{display:flex;align-items:center;gap:6px;font-size:13px}
.user-role{background:#eff6ff;color:var(--primary);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.user-role.admin{background:#fef3c7;color:#d97706}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:500;transition:all .2s;border:none}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-add{background:var(--primary);color:#fff}
.btn-add:hover{background:var(--primary-dark)}
.btn-manage{background:#fef3c7;color:#d97706;border:1.5px solid #fde68a}
.btn-manage:hover{background:#fde68a}

/* CAL NAV */
.cal-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 20px 0}

/* 部门色块说明 */
.dept-legend{display:flex;align-items:center;justify-content:center;gap:20px;padding:8px 20px;background:#f8faff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.dept-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)}
.dept-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cal-nav-btn{background:#fff;border:1.5px solid var(--border);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.cal-nav-title{font-size:16px;font-weight:700;min-width:200px;text-align:center}
.cal-today-btn{background:var(--primary);color:#fff;border:none;padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer}
.cal-today-btn:hover{background:var(--primary-dark)}

/* CALENDAR */
.calendar-wrap{padding:14px 20px 24px;position:relative;overflow-y:visible}
.calendar{border-radius:var(--radius);overflow:auto;border:1px solid var(--border);background:#fff;min-width:880px;box-shadow:var(--shadow);position:relative;height:calc(100vh - 170px);display:flex;flex-direction:column}

/* 表头 - 固定在滚动容器顶部 */
.cal-header{display:grid;grid-template-columns:88px repeat(7,1fr);background:linear-gradient(135deg,var(--primary),var(--secondary));position:sticky;top:0;z-index:20;flex-shrink:0}
.cal-hc-slot{padding:10px 4px;text-align:center;color:#fff;font-size:12px;font-weight:600;border-left:1px solid rgba(255,255,255,.2)}
.cal-hc-slot.label{background:rgba(0,0,0,.15);border-left:none;font-size:10px;width:88px;flex-shrink:0}



/* 周块 */
.cal-week-block{border-bottom:3px solid var(--border)}
.cal-week-block:last-child{border-bottom:none}

/* 周标签 */
.cal-week-tag{font-size:10px;font-weight:700;color:var(--text-muted);padding:3px 10px;background:#f8faff;border-bottom:1px solid var(--border);border-top:1px solid var(--border)}

/* 时段行 */
.cal-row{display:grid;grid-template-columns:88px repeat(7,1fr);border-bottom:1px solid #f1f5f9;min-height:90px;position:relative}
.cal-row:last-child{border-bottom:none}
.cal-row.slot-row{min-height:60px}

/* 时段标签 */
.cal-slot-label-fixed{width:88px;background:#f8faff;border-right:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-cell{padding:4px 3px;border-left:1px solid var(--border);cursor:default;transition:background .15s;position:relative;min-height:90px;overflow:hidden;z-index:1}
.cal-cell.admin-cell{cursor:pointer}
.cal-cell.admin-cell:hover{background:#f0f7ff}
.cal-cell.today-col{background:#eff6ff}
.cal-cell.today-col.admin-cell:hover{background:#dbeafe}
.cal-cell.dim-cell{background:#fafafa;opacity:.6}

/* 事件卡片 */
.event-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px 5px;margin-bottom:2px;font-size:10px;cursor:pointer;transition:all .15s;border-left:3px solid var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.event-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.1);transform:translateY(-1px)}
.event-card.type-sponsor{border-left-color:#f59e0b}
.event-card.type-business{border-left-color:#10b981}
.event-card.type-exchange{border-left-color:#8b5cf6}
/* 搜索匹配卡片高亮 */
.event-card.search-match{background:linear-gradient(135deg,#fef9c3 0%,#fef08a 100%);border-color:#eab308;box-shadow:0 0 0 2px rgba(234,179,8,.3),0 2px 8px rgba(234,179,8,.2)}
.event-card.search-match:hover{box-shadow:0 0 0 2px rgba(234,179,8,.4),0 4px 12px rgba(234,179,8,.3)}
.event-card.search-match .event-name{color:#92400e}
.event-card.search-match .event-owner{color:#a16207}
.event-name{font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.event-owner{color:var(--text-muted);font-size:9px;margin-bottom:2px}
.event-tags{display:flex;flex-wrap:wrap;gap:2px}
.etag{display:inline-block;padding:1px 3px;border-radius:3px;font-size:8px;font-weight:600}
.etag-notice{background:#fef3c7;color:#d97706}
.etag-mention{background:#eff6ff;color:#2563eb}
.etag-hb{background:#fef2f2;color:#ef4444}
.etag-top{background:#f0fdf4;color:#16a34a}
.etag-circle{background:#fdf4ff;color:#9333ea}
.etag-exchange{background:#f5f3ff;color:#7c3aed}

/* 卡片额外信息 */
.card-extra{font-size:9px;color:#64748b;margin-top:2px;border-top:1px dashed #f1f5f9;padding-top:2px}
.card-row{margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.card-label{color:#94a3b8}
.card-tooltip{cursor:help;border-bottom:1px dotted #94a3b8;position:relative}
.card-tooltip:hover::after{content:attr(title);position:absolute;bottom:100%;left:0;background:#1e293b;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;white-space:pre-wrap;max-width:200px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* 加号提示 */
.cell-add-hint{position:absolute;bottom:3px;right:4px;font-size:16px;color:#cbd5e1;opacity:0;transition:opacity .2s;pointer-events:none;line-height:1}
.cal-cell.admin-cell:hover .cell-add-hint{opacity:1}

/* 底部提示 */
.cal-footer-hint{text-align:center;padding:8px;font-size:11px;color:#94a3b8;background:#f8faff;border-top:1px solid var(--border)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:760px}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;border-radius:16px 16px 0 0}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#f1f5f9}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:18px}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);color:var(--text-muted);transition:all .2s;cursor:pointer}
.step-dot.active{background:var(--primary);border-color:var(--primary);color:#fff}
.step-dot.done{background:var(--success);border-color:var(--success);color:#fff}
.step-line{flex:1;height:2px;background:var(--border);transition:background .2s}
.step-line.done{background:var(--success)}
.modal .form-group{margin-bottom:14px}
.modal .form-group label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;display:block}
.modal .form-input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border-color .2s;background:#fff}
.modal .form-input:focus{border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.required::after{content:' *';color:var(--danger)}
.section-title{font-size:13px;font-weight:700;color:var(--primary);margin:16px 0 10px;padding-bottom:5px;border-bottom:2px solid #eff6ff;display:flex;align-items:center;gap:6px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.checkbox-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;transition:all .15s;user-select:none}
.checkbox-item:hover{border-color:var(--primary);color:var(--primary)}
.checkbox-item.checked{background:#eff6ff;border-color:var(--primary);color:var(--primary);font-weight:500}
.radio-group{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.radio-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;transition:all .15s;user-select:none}
.radio-item:hover{border-color:var(--primary)}
.radio-item.selected{background:#eff6ff;border-color:var(--primary);color:var(--primary);font-weight:500}
.date-chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.date-chip{display:flex;flex-direction:column;align-items:center;padding:6px 10px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;min-width:46px;transition:all .2s;background:#fff}
.date-chip:hover{border-color:#2563eb}
.date-chip.checked{background:#dcfce7;border-color:#16a34a}
.chip-day{font-size:10px;color:#94a3b8;font-weight:500}
.chip-num{font-size:16px;font-weight:700;color:#1e293b}
.date-chip.checked .chip-num{color:#16a34a}
.btn-modal-cancel{padding:7px 18px;border:1.5px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-modal-cancel:hover{border-color:var(--primary);color:var(--primary)}
.btn-modal-submit,.btn-modal-next{padding:7px 22px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-modal-submit:hover,.btn-modal-next:hover{background:var(--primary-dark)}
.btn-modal-prev{padding:7px 22px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-modal-prev:hover{background:#eff6ff}
.btn-modal-danger{padding:7px 18px;background:#fef2f2;color:#ef4444;border:1.5px solid #fecaca;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.file-upload-area{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.file-upload-area:hover{border-color:var(--primary);background:#f0f7ff}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f8faff;border-radius:7px;margin-top:6px;font-size:12px}
.file-item a{color:var(--primary);text-decoration:none}
.constraint-tip{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12px;color:#92400e;margin-top:8px;line-height:1.6}

/* DETAIL */
.detail-section{margin-bottom:14px}
.detail-section h4{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #eff6ff}
.detail-row{display:flex;gap:8px;margin-bottom:6px;font-size:13px}
.detail-label{color:var(--text-muted);min-width:90px;flex-shrink:0;font-size:12px}
.detail-value{color:var(--text);font-weight:500;flex:1}

/* ADMIN */
.user-table{width:100%;border-collapse:collapse;font-size:13px}
.user-table th{background:#f8faff;padding:10px 12px;text-align:left;font-weight:600;color:var(--text-muted);border-bottom:2px solid var(--border)}
.user-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.user-table tr:last-child td{border-bottom:none}
.user-table tr:hover td{background:#f8faff}
.status-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.status-admin{background:#fef3c7;color:#d97706}
.status-visitor{background:#f1f5f9;color:#64748b}
.option-section{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.option-section:last-child{border-bottom:none}
.option-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:34px;background:#f8faff;padding:7px;border-radius:8px}
.option-chip{display:flex;align-items:center;gap:3px;background:#fff;border:1px solid var(--border);padding:3px 8px;border-radius:7px;font-size:12px}
.option-chip button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;font-size:11px;line-height:1}
.option-chip button:hover{color:var(--danger)}
.option-add-row{display:flex;gap:7px}
.option-add-input{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;outline:none}
.option-add-input:focus{border-color:var(--primary)}
.btn-add-opt{padding:6px 12px;background:var(--primary);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;white-space:nowrap}
.admin-tab-btns{display:flex;gap:6px;margin-bottom:18px}
.admin-tab-btn{padding:7px 16px;border:1.5px solid var(--border);background:transparent;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.admin-tab-btn.active{background:#eff6ff;color:var(--primary);border-color:#bfdbfe;font-weight:600}

/* TOAST */
.toast{position:fixed;top:66px;right:20px;background:#1e293b;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(-16px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;z-index:9998}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none!important}
/* 搜索高亮 */
.search-highlight{background:#fef08a;color:#92400e;padding:0 2px;border-radius:3px;font-weight:600}

/* 日历日期选择器 */
.date-picker-wrap{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-top:8px}
.date-picker-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.date-picker-nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.date-picker-nav-btn:hover{background:rgba(255,255,255,.35)}
.date-picker-title{font-size:14px;font-weight:700}
.date-picker-grid{display:grid;grid-template-columns:repeat(7,1fr);background:#fff}
.date-picker-cell{text-align:center;padding:8px 4px;border:1px solid #f1f5f9;font-size:12px;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.date-picker-cell:hover{background:#eff6ff}
.date-picker-cell.selected{background:#dcfce7;border-color:#16a34a}
.date-picker-cell.today .dp-day{background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.date-picker-cell.other-month{opacity:.4}
.date-picker-cell .dp-day{font-size:13px;font-weight:600;color:var(--text)}
.date-picker-cell .dp-week{font-size:9px;color:#94a3b8;margin-top:1px}
.date-picker-cell.selected .dp-day{color:#16a34a;font-weight:700}


/* 周日期行 - 显示每周的7天日期 */
.cal-week-dates{display:grid;grid-template-columns:88px repeat(7,1fr);background:#f8faff;border-bottom:2px solid var(--border);position:sticky;top:42px;z-index:15}

/* 时段固定列 - 垂直滚动时固定 */
.cal-slot-label-sticky{position:sticky;left:0;z-index:5;background:#fafbfc;border-right:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text-muted);min-height:36px;width:88px}

/* 周日期单元格 */
.cal-week-date-cell{padding:6px 2px;text-align:center;border-left:1px solid #e2e8f0}
.cal-week-date-cell.today-week .cal-week-date-num{background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;line-height:26px;display:inline-block;margin:auto}
.cal-week-date-cell.dim-week{opacity:0.5}
.cal-week-date-cell.holiday-week .cal-week-date-num{background:#fde68a!important;color:#92400e!important;border-radius:50%;width:26px;height:26px;line-height:26px;display:inline-block;margin:auto}
.cal-week-date-cell.weekend-week .cal-week-date-num{background:#f1f5f9!important;color:#6b7280!important;border-radius:50%;width:26px;height:26px;line-height:26px;display:inline-block;margin:auto}
.cal-week-date-num{font-size:12px;font-weight:700;color:var(--text);display:block}
.cal-holiday-tag{font-size:8px;color:#d97706;display:block;margin-top:2px}

/* 时段行 */
.cal-row{display:grid;grid-template-columns:88px repeat(7,1fr);border-bottom:1px solid #f1f5f9;min-height:90px}
.cal-row:last-child{border-bottom:none}

/* 时段标签 - 固定列 */

// ===== UTILS =====
function getWeekStart(d) {
  const x = new Date(d); const day = x.getDay();
  x.setDate(x.getDate() - (day===0?6:day-1)); x.setHours(0,0,0,0); return x;
}
function getMonthStart(d) {
  const x = new Date(d); x.setDate(1); x.setHours(0,0,0,0); return x;
}
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isToday(d){ const t=new Date(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function j(v){ if(Array.isArray(v))return v; if(typeof v==='object'&&v!==null)return v; try{return JSON.parse(v||'[]');}catch(e){return [];} }

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show ${type}`;
  setTimeout(()=>el.className='toast',2600);
}

let loadingTimer=null;
let _loadingShouldShow=false;  // 标志位：解决 200ms 延迟导致的竞态
function showLoading(show=true) {
  clearTimeout(loadingTimer);
  if(show) {
    _loadingShouldShow=true;
    loadingTimer = setTimeout(()=>{
      if(!_loadingShouldShow) return; // 已被关闭，不创建遮罩
      if(!document.getElementById('loading-ov')) {
        const el=document.createElement('div'); el.id='loading-ov'; el.className='loading-overlay';
        el.innerHTML='<div class="spinner"></div>'; document.body.appendChild(el);
      }
    }, 200);
  } else {
    _loadingShouldShow=false;
    const el=document.getElementById('loading-ov'); if(el) el.remove();
  }
}

async function api(method, table, params='', body=null) {
  const opts2 = { method, headers: {...HEADERS} };
  if(body) opts2.body = JSON.stringify(body);
  if(method==='POST') opts2.headers['Prefer']='return=representation';
  if(method==='PATCH') opts2.headers['Prefer']='return=representation';
  const r = await fetch(`${SB_URL}/rest/v1/${table}${params}`, opts2);
  if(!r.ok) { const t=await r.text(); throw new Error(t); }
  if(method==='DELETE') return true;
  const txt=await r.text(); return txt?JSON.parse(txt):[];
}

async function doLogin() {
  const phone=document.getElementById('login-phone').value.trim();

        showLoading(false);

      }
      if(testR.status === 404) {

// 滚动到今日所在位置
function goToToday() {
  const today = new Date();
  const calNav = document.querySelector('.cal-nav');
  if (!calNav) return;
  
  // 计算今日在日历中的位置
  const calendarWrap = document.querySelector('.calendar-wrap');
  if (!calendarWrap) return;
  
  // 查找今日所在的单元格
  const todayStr = today.toISOString().split('T')[0];
  const allCells = document.querySelectorAll('.cal-week-date-cell');
  
  for (const cell of allCells) {
    if (cell.dataset.date === todayStr) {
      // 找到了今日单元格，滚动到该位置
      const scrollTop = cell.offsetTop - calNav.offsetHeight - 80;
      calendarWrap.scrollTo({ top: Math.max(0, scrollTop), behavior: 'smooth' });
      break; // 找到后立即停止
    }
  }
}

async function refreshCalendar() {
  showLoading();
  try {
    let data;
    if(searchQuery) {
      const q=encodeURIComponent(searchQuery);
      data=await api('GET','bj_schedules',`?or=(activity_name.ilike.%25${q}%25,department.ilike.%25${q}%25,owner.ilike.%25${q}%25,activity_type.ilike.%25${q}%25)&order=date.asc`);
    } else {
      // 获取当月全部数据
      const mEnd = new Date(monthStart);
      mEnd.setMonth(mEnd.getMonth() + 1);
      mEnd.setDate(mEnd.getDate() - 1);
      data=await api('GET','bj_schedules',`?date=gte.${fmtDate(monthStart)}&date=lte.${fmtDate(mEnd)}&order=date.asc`);
    }
    scheduleMap={};
    data.forEach(item=>{ const k=`${item.date}`; if(!scheduleMap[k]) scheduleMap[k]=[]; scheduleMap[k].push(item); });
  } catch(e){ toast('加载数据失败','error'); console.error(e); scheduleMap={}; }
  showLoading(false);
  renderCalendar();
}

function renderCalendar() {
  const y = monthStart.getFullYear(), m = monthStart.getMonth() + 1;
  document.getElementById('cal-nav-title').textContent = searchQuery
    ? `🔍 搜索结果：${searchQuery}`
    : `${y}年${m}月`;

  // 当月第一天（转成该周的周一）
  const firstDay = new Date(monthStart);
  firstDay.setDate(1);
  const firstDow = firstDay.getDay() === 0 ? 7 : firstDay.getDay();
  firstDay.setDate(firstDay.getDate() - (firstDow - 1));

  // 当月最后一天
  const lastDay = new Date(monthStart);
  lastDay.setMonth(lastDay.getMonth() + 1);
  lastDay.setDate(lastDay.getDate() - 1);

  // 总周数
  const daysSpan = Math.ceil((lastDay - firstDay) / 86400000) + 1;
  const totalWeeks = Math.ceil(daysSpan / 7);

  const WEEKDAY_LABELS = ['一', '二', '三', '四', '五', '六', '日'];

  let h = '';

  // ===== 表头 =====
  h += '<div class="cal-header">';
  h += '<div class="cal-hc-slot label">日期</div>';
  for (let i = 0; i < 7; i++) h += `<div class="cal-hc-slot">周${WEEKDAY_LABELS[i]}</div>`;
  h += '</div>';

  // 四个时段定义
  const TIME_SLOTS = [
    { key: '上午群发', label: '上午群发', color: '#10b981' },
    { key: '上午发圈', label: '上午发圈', color: '#8b5cf6' },
    { key: '下午群发', label: '下午群发', color: '#f59e0b' },
    { key: '下午发圈', label: '下午发圈', color: '#ef4444' }
  ];

  // ===== 主体：每天四行时段 =====
  for (let wk = 0; wk < totalWeeks; wk++) {
    h += `<div class="cal-week-block">`;
    
    // 1. 周日期行
    h += `<div class="cal-week-dates">`;
    h += `<div class="cal-slot-label-sticky"></div>`;
    for (let di = 0; di < 7; di++) {
      const d = new Date(firstDay);
      d.setDate(firstDay.getDate() + wk * 7 + di);
      const ds = fmtDate(d);
      const inMonth = d.getMonth() + 1 === m;
      const isTodayD = isToday(d);
      const hm = HOLIDAYS_2026[ds.slice(5)];
      const dow = d.getDay();
      const isWeekend = dow === 0 || dow === 6;
      const isWeekendDay = isWeekend && !hm;
      const cellClass = isTodayD ? 'today-week' : (!inMonth ? 'dim-week' : '') + (hm ? ' holiday-week' : isWeekendDay ? ' weekend-week' : '');
      const title = hm ? hm : isWeekendDay ? '周末' : '';
      h += `<div class="cal-week-date-cell ${cellClass}" data-date="${ds}"${title ? ' title="' + title + '"' : ''}>
        <span class="cal-week-date-num">${d.getDate()}</span>
        ${hm ? '<span class="cal-holiday-tag">' + hm + '</span>' : ''}
      </div>`;
    }
    h += `</div>`;

    // 2. 四个时段行
    TIME_SLOTS.forEach(slot => {
      h += `<div class="cal-row slot-row" data-slot="${slot.key}">`;
      h += `<div class="cal-slot-label-fixed" style="background:${slot.color};color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;padding:4px;">${slot.label}</div>`;
      for (let di = 0; di < 7; di++) {
        const d = new Date(firstDay);
        d.setDate(firstDay.getDate() + wk * 7 + di);
        const ds = fmtDate(d);
        const inMonth = d.getMonth() + 1 === m;
        const tc = isToday(d) ? ' today-col' : '';
        const ac = isSuperAdmin ? ' admin-cell' : '';
        
        // 获取该日期的所有排期
        const dayEvents = scheduleMap[ds] || [];
        
        // 找出属于该时段的排期（检查 circle_time_slots 和 community_time_slots）
        const slotEvents = dayEvents.filter(ev => {
          // 兼容旧数据：time_slot 字段
          if (ev.time_slot === slot.key) return true;
          // 检查宣发时段
          const circleSlots = j(ev.circle_time_slots || '[]');
          if (circleSlots.includes(slot.key)) return true;
          // 检查社群时段
          const communitySlots = j(ev.community_time_slots || '[]');
          return communitySlots.includes(slot.key);
        });
        
        h += `<div class="cal-cell${tc}${ac}${!inMonth ? ' dim-cell' : ''}" ondblclick="${isSuperAdmin ? `dbClick('${ds}','${slot.key}',event)` : ''}">`;
        slotEvents.forEach(ev => h += renderCard(ev, slot.key));
        if (isAdmin && slotEvents.length === 0) h += '<div class="cell-add-hint">＋</div>';
        h += '</div>';
      }
      h += '</div>';
    });
    
    h += '</div>';
  }

  if (searchQuery) {
    h += '<div class="cal-footer-hint">🔍 搜索模式：显示所有匹配"<b>' + searchQuery + '</b>"的排期 · <a href="#" onclick="goThisMonth();return false" style="color:var(--primary)">清除搜索</a></div>';
  } else if (isSuperAdmin) {
    h += '<div class="cal-footer-hint">💡 点击单元格可快速新增排期 · 点击卡片查看详情</div>';
  }

  document.getElementById('calendar').innerHTML = h;
}

// ===== 搜索高亮辅助 =====
function highlightText(text, query) {
  if (!query || !text) return text;
  var esc = query.replace(/[.*+?^$()|[]\]/g, '\$&');
  var regex = new RegExp('(' + esc + ')', 'gi');
  return String(text).replace(regex, '<mark class="search-highlight">$1</mark>');
}

// ===== 日期选择器 =====
function renderDatePicker() {
  var y = pickerMonth.getFullYear(), m = pickerMonth.getMonth() + 1;
  var today = new Date();
  today.setHours(0,0,0,0);

  // 起始：Picker月份的第一天所在周的周一
  var firstDay = new Date(pickerMonth);
  firstDay.setDate(1);
  var firstDow = firstDay.getDay() === 0 ? 7 : firstDay.getDay();
  firstDay.setDate(firstDay.getDate() - (firstDow - 1));

  // 渲染42天（6周）
  var WEEKDAY_LABELS = ['一', '二', '三', '四', '五', '六', '日'];
  var curDates = md.dates || (md.date ? [md.date] : []);

  var cells = '';
  for (var i = 0; i < 42; i++) {
    var d = new Date(firstDay);
    d.setDate(firstDay.getDate() + i);
    var ds = fmtDate(d);
    var isCurrentMonth = d.getMonth() + 1 === m;
    var isSelected = curDates.indexOf(ds) >= 0;
    var isTodayD = d >= today; // 今天及以后可选
    var classes = ['date-picker-cell'];
    if (isSelected) classes.push('selected');
    if (!isCurrentMonth) classes.push('other-month');
    if (isTodayD && isCurrentMonth) classes.push('today');
    var disabled = !isTodayD || !isCurrentMonth ? ' style="opacity:0.3;pointer-events:none"' : '';
    var wday = WEEKDAY_LABELS[d.getDay() === 0 ? 6 : d.getDay() - 1];
    cells += '<div class="' + classes.join(' ') + '"' + disabled + ' onclick="togglePickerDate(\'' + ds + '\', this)">' +
      '<span class="dp-day">' + d.getDate() + '</span>' +
      '<span class="dp-week">' + wday + '</span>' +
      '</div>';
  }

  document.getElementById('f_dates').innerHTML = '<div class="date-picker-wrap">' +
    '<div class="date-picker-nav">' +
    '<button class="date-picker-nav-btn" onclick="changePickerMonth(-1)">&#8249;</button>' +
    '<span class="date-picker-title">' + y + '年' + m + '月</span>' +
    '<button class="date-picker-nav-btn" onclick="changePickerMonth(1)">&#8250;</button>' +
    '</div>' +
    '<div class="date-picker-grid">' +
    WEEKDAY_LABELS.map(function(w) { return '<div style="text-align:center;padding:6px 0;font-size:11px;font-weight:700;color:var(--text-muted);border-bottom:1px solid #f1f5f9">周' + w + '</div>'; }).join('') +
    cells +
    '</div></div>' +
    '<div style="font-size:11px;color:var(--text-muted);margin-top:6px">&#128161; 点击日期选中/取消，绿色为已选</div>';
}

function changePickerMonth(delta) {
  var x = new Date(pickerMonth);
  x.setMonth(x.getMonth() + delta);
  pickerMonth = new Date(x.getFullYear(), x.getMonth(), 1);
  renderDatePicker();
}

function togglePickerDate(ds, el) {
  if (!md.dates) md.dates = [];
  var idx = md.dates.indexOf(ds);
  if (idx >= 0) {
    md.dates.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    md.dates.push(ds);
    el.classList.add('selected');
  }
}

function renderCard(ev, slotKey) {
  var sa=j(ev.circle_service_accounts||'[]');
  var cg=j(ev.community_group_details||'[]');
  var cf=j(ev.community_publish_forms||'[]');
  var tc = ev.activity_type==='赞助'?'type-sponsor':ev.activity_type==='商务'?'type-business':ev.activity_type==='置换'?'type-exchange':'';
  var nameHtml = highlightText(ev.activity_name || '', searchQuery);
  var ownerHtml = highlightText(ev.owner || '', searchQuery);
  
  // 判断是群发时段还是发圈时段
  var isCommunitySlot = slotKey && (slotKey.includes('群发'));
  var isCircleSlot = slotKey && (slotKey.includes('发圈'));
  
  var extraHtml = '';
  
  if (isCommunitySlot) {
    // 群发时段卡片：宣传形式、是否发红包、群明细（hover显示全部）
    var forms = cf.length > 0 ? cf.join('、') : '-';
    var hasHongbao = ev.has_hongbao_community ? '是' : '否';
    var firstGroup = cg.length > 0 ? (cg[0].name || cg[0].group_name || JSON.stringify(cg[0])) : '-';
    
    // 构建群明细tooltip
    var groupsTooltip = '';
    if (cg.length > 0) {
      var allGroups = cg.map(g => g.name || g.group_name || JSON.stringify(g)).join('<br>');
      groupsTooltip = '<span class="card-tooltip" title="' + allGroups.replace(/"/g, '&quot;') + '">' + (cg.length > 1 ? firstGroup + '...' : firstGroup) + '</span>';
    } else {
      groupsTooltip = '-';
    }
    
    extraHtml = '<div class="card-extra">' +
      '<div class="card-row"><span class="card-label">形式：</span>' + forms + '</div>' +
      '<div class="card-row"><span class="card-label">红包：</span>' + hasHongbao + '</div>' +
      '<div class="card-row"><span class="card-label">群：</span>' + groupsTooltip + '</div>' +
      '</div>';
  } else if (isCircleSlot) {
    // 发圈时段卡片：客服号
    var accountsDisplay = '-';
    if (sa.length > 0) {
      // 检查是否是全选（假设全选时 sa 是 ["全选"] 或包含特定标记）
      if (sa.length === 1 && (sa[0] === '全选' || sa[0] === '所有客服号')) {
        accountsDisplay = '所有客服号';
      } else if (sa.length > 0) {
        accountsDisplay = sa.join('、');
      }
    }
    
    extraHtml = '<div class="card-extra">' +
      '<div class="card-row"><span class="card-label">客服：</span>' + accountsDisplay + '</div>' +
      '</div>';
  }
  
  // 左键点击预览文案海报，右键点击编辑
  // 搜索模式下整块高亮
  var searchHighlight = searchQuery ? ' search-match' : '';
  return '<div class="event-card ' + tc + searchHighlight + '" onclick="openCaptionPreview(' + ev.id + ',event)" oncontextmenu="event.preventDefault();openEditModal(' + ev.id + ')">' +
    '<div class="event-name">' + nameHtml + '</div>' +
    '<div class="event-owner">&#128100; ' + ownerHtml + '</div>' +
    extraHtml +
    '</div>';
}

function openAddModal(preDate='', preSlot='') {
  if(!isAdmin) return toast('管理员可操作','error');
  editingId=null; pendingFiles=[]; md={date:preDate, slot:preSlot, time_slot:preSlot};
  pickerMonth = new Date(); // 重置日期选择器月份
  currentStep = 1; // 重置步骤
  document.getElementById('sch-modal-title').textContent='新增排期';

  document.getElementById('sch-modal').classList.remove('hidden');

async function openEditModal(id) {
  if(!isAdmin) return toast('管理员可操作','error');
  const mb=document.getElementById('sch-modal-body');
  if(!mb){ toast('页面错误，请刷新','error'); return; }
  showLoading();
  try {
    const data=await api('GET','bj_schedules',`?id=eq.${id}`);
    if(!data||!data[0]){showLoading(false);toast('数据不存在','error');return;}
    
    const firstRecord = data[0];
    editingId=id; 
    pendingFiles=[]; 
    md={...firstRecord};
    
    // 如果有 batch_id，加载同一批次的其他记录获取所有日期
    if(md.batch_id) {
      const batchData = await api('GET','bj_schedules',`?batch_id=eq.${md.batch_id}&select=date`);
      if(batchData && batchData.length > 0) {
        // 收集所有日期
        const allDates = [...new Set(batchData.map(r => r.date))].sort();
        md.dates = allDates;
      }
    } else {
      md.dates = [md.date];
    }
    
    // 解析 JSON 字段
    md.service_accounts=j(md.circle_service_accounts||'[]');
    md.circle_dates=j(md.circle_publish_dates||'[]');
    md.community_groups=j(md.community_group_details||'[]');
    md.community_dates=j(md.community_publish_dates||'[]');
    md.community_forms=j(md.community_publish_forms||'[]');
    md.contract_files=j(md.contract_files||'[]');
    
    // 设置日期选择器月份
    if(md.date) {
      const dParts = md.date.split('-');
      pickerMonth = new Date(parseInt(dParts[0]), parseInt(dParts[1]) - 1, 1);
    } else {
      pickerMonth = new Date();
    }
    currentStep = 1;
    document.getElementById('sch-modal-title').textContent='编辑排期（同一批次）';
    document.getElementById('sch-modal').classList.remove('hidden');
    showLoading(false);
    try { renderStep1(); updateNavButtons(); } catch(e2){ toast('表单渲染失败','error'); console.error(e2); }
  }catch(e){showLoading(false);toast('加载失败','error');}
}

function handlePosterUpload(input, type) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    toast('图片大小不得超过5M', 'error');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    md[type + '_poster'] = e.target.result;
    document.getElementById(type + '_poster_preview').innerHTML = '<img src="' + e.target.result + '" style="max-width:200px;max-height:150px;border-radius:8px">';
    // 添加删除按钮
    const wrap = document.getElementById(type + '_poster_preview').parentElement;
    let delBtn = wrap.nextElementSibling;
    if (delBtn && delBtn.textContent.includes('删除')) delBtn.remove();
    const newDelBtn = document.createElement('button');
    newDelBtn.type = 'button';
    newDelBtn.className = 'btn-sm';
    newDelBtn.style = 'background:#fef2f2;color:#ef4444;border:1px solid #fecaca;padding:4px 10px;border-radius:6px;margin-top:6px;cursor:pointer';
    newDelBtn.textContent = '删除';
    newDelBtn.onclick = function() { removePoster(type); };
    wrap.parentNode.insertBefore(newDelBtn, wrap.nextSibling);
  };
  reader.readAsDataURL(file);
}

function removePoster(type) {
  md[type + '_poster'] = null;
  document.getElementById(type + '_poster_preview').innerHTML = '<div style="color:var(--text-muted)">📷 点击上传图片（不超过5M）</div>';
  const delBtn = document.getElementById('f_' + type + '_poster');
  if (delBtn) delBtn.value = '';
  const wrap = document.getElementById(type + '_poster_preview').parentElement;
  let delBtn2 = wrap.nextElementSibling;
  if (delBtn2 && delBtn2.textContent.includes('删除')) delBtn2.remove();
}

async function submitSchedule() {
  // 保存社群宣传文案
  md.community_caption = document.getElementById('f_community_caption').value;
  
  // 验证群明细
  const communityGroups = md.community_groups || [];
  if (communityGroups.length === 0) return toast('请至少选择一个群明细', 'error');
  
  // 验证宣发日期
  if (!md.community_dates || md.community_dates.length === 0) return toast('请至少选择一个宣发日期', 'error');
  
  // 验证宣发时段（可多选）
  if (!md.community_time_slots || md.community_time_slots.length === 0) return toast('请至少选择一个社群宣发时段', 'error');
  
  // 验证宣传形式
  const communityForms = md.community_forms || [];
  if (communityForms.length === 0) return toast('请至少选择一个宣传形式', 'error');
  
  // 验证是否发红包
  if (md.community_hongbao === undefined) return toast('请选择是否发红包', 'error');
  
  // 收集所有数据
  const screenshotReq = document.getElementById('f_screenshot').value.trim();
  const existingFiles = Array.isArray(md.contract_files) ? md.contract_files : [];
  const newFiles = pendingFiles.map(f => ({name: f.name, url: URL.createObjectURL(f), size: f.size}));
  const allFiles = [...existingFiles, ...newFiles];
  
  // 合并所有宣发日期（朋友圈 + 社群）
  const allDates = [...new Set([...(md.circle_dates || []), ...(md.community_dates || [])])];
  const total = allDates.length;
  
  if (total > 30) { toast('批量数量不超过30条，请减少选择', 'error'); return; }
  
  showLoading(true);
  
  try {
    // 合并所有时段（朋友圈 + 社群）
    const allTimeSlots = [
      ...(md.circle_time_slots || []),
      ...(md.community_time_slots || [])
    ];
    const uniqueTimeSlots = [...new Set(allTimeSlots)];
    
    // 构建公共字段
    const commonPayload = {
      activity_name: md.activity_name,
      department: md.department,
      activity_type: md.activity_type,
      owner: md.owner,
      time_slots: JSON.stringify(uniqueTimeSlots),
      circle_service_accounts: JSON.stringify(md.service_accounts || []),
      circle_publish_dates: JSON.stringify(md.circle_dates || []),
      circle_time_slots: JSON.stringify(md.circle_time_slots || []),
      circle_caption: md.circle_caption || '',
      circle_poster: md.circle_poster || '',
      community_group_details: JSON.stringify(md.community_groups || []),
      community_publish_dates: JSON.stringify(md.community_dates || []),
      community_time_slots: JSON.stringify(md.community_time_slots || []),
      community_publish_forms: JSON.stringify(md.community_forms || []),
      community_caption: md.community_caption || '',
      community_poster: md.community_poster || '',
      has_hongbao_community: md.community_hongbao,
      contract_files: JSON.stringify(allFiles),
      screenshot_requirement: screenshotReq,
      updated_at: new Date().toISOString()
    };
    
    if(editingId && md.batch_id) {
      // ===== 编辑模式：更新整个批次 =====
      
      // 1. 获取当前批次的所有记录
      const batchRecords = await api('GET','bj_schedules',`?batch_id=eq.${md.batch_id}&select=id,date`);
      const existingDates = batchRecords.map(r => r.date);
      const existingIds = batchRecords.map(r => r.id);
      
      // 2. 需要保留的日期
      const datesToKeep = allDates.filter(d => existingDates.includes(d));
      // 3. 需要新增的日期
      const datesToAdd = allDates.filter(d => !existingDates.includes(d));
      // 4. 需要删除的记录（不在新日期范围内的）
      const idsToDelete = batchRecords.filter(r => !allDates.includes(r.date)).map(r => r.id);
      
      // 5. 更新现有记录
      for (const record of batchRecords) {
        if(allDates.includes(record.date)) {
          await api('PATCH','bj_schedules',`?id=eq.${record.id}`, {
            ...commonPayload,
            date: record.date
          });
        }
      }
      
      // 6. 新增日期记录
      for (const d of datesToAdd) {
        await api('POST','bj_schedules','', {
          ...commonPayload,
          date: d,
          batch_id: md.batch_id,
          created_by: md.created_by || currentUser.id
        });
      }
      
      // 7. 删除多余记录
      for (const id of idsToDelete) {
        await api('DELETE','bj_schedules',`?id=eq.${id}`);
      }
      
      toast(`已更新批次，共 ${allDates.length} 条`, 'success');
    } else {
      // ===== 新增模式 =====
      const batchId = md.batch_id || crypto.randomUUID();
      let count = 0;
      
      for (const d of allDates) {
        await api('POST','bj_schedules','', {
          ...commonPayload,
          date: d,
          batch_id: batchId,
          created_by: currentUser.id
        });
        count++;
      }
      toast(`已提交 ${count} 条排期`, 'success');
    }
    
    closeModal('sch-modal');
    pendingFiles = [];
    showLoading(false);
    await refreshCalendar();
  } catch(e) {
    showLoading(false);
    toast('保存失败：' + e.message, 'error');
  }
}

function tck(el, field, value) {
  el.classList.toggle('checked');
  if(!Array.isArray(md[field])) md[field]=[];
  if(el.classList.contains('checked')){ if(!md[field].includes(value)) md[field].push(value); }
  else md[field]=md[field].filter(v=>v!==value);
}

function pickFiles(e) {

      }
      if(communityPoster) {
        html += '<div style="text-align:center"><img src="'+communityPoster+'" style="max-width:100%;border-radius:8px"></div>';
      }
      html += '</div>';
    }
    
    // 无内容提示
    if(!html) {
      html = '<div style="text-align:center;padding:30px;color:var(--text-muted)">暂无文案或海报</div>';
    }
    
    pb.innerHTML = html;
    document.getElementById('preview-modal').classList.remove('hidden');
  }catch(e){showLoading(false);toast('加载失败','error');}
}

// ===== DETAIL MODAL =====
async function openDetail(id, e) {
  if(e) e.stopPropagation();
  const db=document.getElementById('detail-body');
  if(!db){ toast('页面错误，请刷新','error'); return; }
  showLoading(true);
  try {
    const data=await api('GET','bj_schedules',`?id=eq.${id}`);
    if(!data||!data[0]){showLoading(false);toast('数据不存在','error');return;}
    const ev=data[0];
    showLoading(false);
    const tc={'赞助':'#f59e0b','商务':'#10b981','置换':'#8b5cf6'};
    const sa=j(ev.circle_service_accounts||'[]');
    const cd=j(ev.circle_publish_dates||'[]');
    const cg=j(ev.community_group_details||'[]');
    const cfd=j(ev.community_publish_dates||'[]');
    const cf=j(ev.community_publish_forms||'[]');
    const files=j(ev.contract_files||'[]');
    
    let b=`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
      <div style="flex:1"><div style="font-size:19px;font-weight:800">${ev.activity_name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${ev.date}</div></div>
      <span style="background:${(tc[ev.activity_type]||'#2563eb')}20;color:${tc[ev.activity_type]||'#2563eb'};padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap">${ev.activity_type}</span>
    </div>`;
    
    b+=`<div class="detail-section"><h4>基本信息</h4>
      <div class="detail-row"><span class="detail-label">活动部门</span><span class="detail-value">${ev.department||'-'}</span></div>
      <div class="detail-row"><span class="detail-label">负责人</span><span class="detail-value">${ev.owner}</span></div>
    </div>`;
    
    if(sa.length>0 || cg.length>0) {
      if(sa.length>0) {
        b+=`<div class="detail-section"><h4>📢 朋友圈宣传</h4>
          <div class="detail-row"><span class="detail-label">客服号</span><span class="detail-value">${sa.join('、')}</span></div>
          <div class="detail-row"><span class="detail-label">宣发日期</span><span class="detail-value">${cd.join('、')||'-'}</span></div>
          <div class="detail-row"><span class="detail-label">发红包</span><span class="detail-value">${ev.has_hongbao_circle?'✅ 是':'❌ 否'}</span></div>
          ${ev.circle_caption ? `<div class="detail-row"><span class="detail-label">宣传文案</span><span class="detail-value" style="white-space:pre-wrap">${ev.circle_caption}</span></div>` : ''}
          ${ev.circle_poster ? `<div class="detail-row"><span class="detail-label">宣传海报</span><span class="detail-value"><img src="${ev.circle_poster}" style="max-width:200px;border-radius:8px;margin-top:8px"></span></div>` : ''}
        </div>`;
      }
      if(cg.length>0) {
        b+=`<div class="detail-section"><h4>📣 社群宣传</h4>
          <div class="detail-row"><span class="detail-label">群明细</span><span class="detail-value">${cg.join('、')}</span></div>
          <div class="detail-row"><span class="detail-label">宣发日期</span><span class="detail-value">${cfd.join('、')||'-'}</span></div>
          <div class="detail-row"><span class="detail-label">宣传形式</span><span class="detail-value">${cf.join('、')||'-'}</span></div>
          <div class="detail-row"><span class="detail-label">发红包</span><span class="detail-value">${ev.has_hongbao_community?'✅ 是':'❌ 否'}</span></div>
          ${ev.community_caption ? `<div class="detail-row"><span class="detail-label">宣传文案</span><span class="detail-value" style="white-space:pre-wrap">${ev.community_caption}</span></div>` : ''}
          ${ev.community_poster ? `<div class="detail-row"><span class="detail-label">宣传海报</span><span class="detail-value"><img src="${ev.community_poster}" style="max-width:200px;border-radius:8px;margin-top:8px"></span></div>` : ''}
        </div>`;
      }
    }
    
    if(ev.screenshot_requirement || files.length>0) {
      b+=`<div class="detail-section"><h4>📎 合同及截图</h4>
        ${ev.screenshot_requirement?`<div class="detail-row"><span class="detail-label">截图要求</span><span class="detail-value">${ev.screenshot_requirement}</span></div>`:''}
        ${files.length?`<div class="detail-row"><span class="detail-label">合同文件</span><span class="detail-value">${files.map(f=>`<a href="${f.url}" target="_blank" style="color:var(--primary)">📄 ${f.name}</a>`).join('<br>')}</span></div>`:''}
      </div>`;
    }
    
    document.getElementById('detail-body').innerHTML=b;
    if(isSuperAdmin) {
      document.getElementById('detail-footer').innerHTML=`
        <button class="btn-modal-cancel" onclick="closeModal('detail-modal')">关闭</button>
        <button class="btn-modal-danger" onclick="delSchedule(${ev.id})">🗑 删除</button>
        <button class="btn-modal-next" onclick="closeModal('detail-modal');openEditModal(${ev.id})">✏️ 编辑</button>
      `;
    } else if(isAdmin) {
      document.getElementById('detail-footer').innerHTML='<button class="btn-modal-cancel" onclick="closeModal(\'detail-modal\')">关闭</button>';
    } else {
      document.getElementById('detail-footer').innerHTML='<button class="btn-modal-cancel" onclick="closeModal(\'detail-modal\')">关闭</button>';
    }
    document.getElementById('detail-modal').classList.remove('hidden');
  }catch(e){showLoading(false);toast('加载失败','error');}
}

async function delSchedule(id) {
  if(!confirm('确定删除该排期？')) return;
  showLoading();
  try {
    await api('DELETE','bj_schedules',`?id=eq.${id}`);
    toast('已删除','success'); closeModal('detail-modal'); await refreshCalendar();
  }catch(e){showLoading(false);toast('删除失败','error');}
}

// ===== ADMIN MODAL =====
let curAdminTab='users';

async function openAdminModal() {
  document.getElementById('admin-modal').classList.remove('hidden');
  switchAdminTab('users');
}

async function switchAdminTab(tab) {
  curAdminTab=tab;
  ['users','opts'].forEach(t=>{
    document.getElementById(`atab-${t}`).className='admin-tab-btn'+(t===tab?' active':'');
    document.getElementById(`admin-${t==='users'?'users':'opts'}-panel`).className=t===tab?'':'hidden';
  });
  if(tab==='users') await loadUsersPanel();
  else renderOptsPanel();
}

async function loadUsersPanel() {
  document.getElementById('admin-users-panel').innerHTML='<div style="color:var(--text-muted);font-size:13px">加载中...</div>';
  showLoading();
  try {
    const users=await api('GET','bj_users','?order=created_at.asc');
    let h=`<table class="user-table"><thead><tr><th>手机号</th><th>昵称</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead><tbody>`;
    users.forEach(u=>{
      const isRootAdmin=u.phone===ADMIN_PHONE;
      const roleLabel=u.role==='super_admin'?'超级管理员':u.role==='admin'?'管理员':'游客';
      const roleClass=u.role==='admin'||u.role==='super_admin'?'status-admin':'status-visitor';
      h+=`<tr><td>${u.phone}</td><td>${u.name||'-'}</td>
        <td><span class="status-badge ${roleClass}">${roleLabel}</span></td>
        <td>${new Date(u.created_at).toLocaleDateString('zh-CN')}</td>
        <td>${isRootAdmin?'<span style="color:#94a3b8;font-size:12px">超管（不可修改）</span>':
          u.role==='super_admin'?`<button style="padding:3px 10px;background:#fef2f2;color:#ef4444;border:1px solid #fecaca;border-radius:6px;cursor:pointer;font-size:12px" onclick="setUserRole('${u.id}','admin')">降为管理员</button>`:
          u.role==='admin'?`<button style="padding:3px 10px;background:#fef3c7;color:#d97706;border:1px solid #fde68a;border-radius:6px;cursor:pointer;font-size:12px" onclick="setUserRole('${u.id}','super_admin')">升为超管</button><button style="padding:3px 10px;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:12px;margin-left:4px" onclick="setUserRole('${u.id}','visitor')">降为游客</button>`:
          `<button style="padding:3px 10px;background:#fef3c7;color:#d97706;border:1px solid #fde68a;border-radius:6px;cursor:pointer;font-size:12px" onclick="setUserRole('${u.id}','admin')">升为管理员</button>`}
        </td></tr>`;
    });
    h+='</tbody></table>';
    document.getElementById('admin-users-panel').innerHTML=h;
  }catch(e){ document.getElementById('admin-users-panel').innerHTML='<p style="color:var(--danger)">加载失败</p>'; }
  showLoading(false);
}

async function setUserRole(id, role) {
  if(!confirm(`确定${role==='admin'?'升级为管理员':'降为游客'}？`)) return;
  showLoading();
  try {
    await api('PATCH','bj_users',`?id=eq.${id}`,{role});
    toast(role==='admin'?'已升级为管理员':'已降为游客','success');
    await loadUsersPanel();
  }catch(e){showLoading(false);toast('操作失败','error');}
}

const OPT_CATS=[
  {k:'departments',l:'活动部门'},
  {k:'circleServiceAccounts',l:'朋友圈 · 客服号'},
  {k:'communityGroups',l:'社群 · 群明细'},
];

function renderOptsPanel() {
  let h='';
  OPT_CATS.forEach(cat=>{
    const items=opts[cat.k]||[];
    h+=`<div class="option-section">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)">${cat.l}</div>
      <div class="option-list" id="olist-${cat.k}">
        ${items.map(v=>`<div class="option-chip">${v}<button onclick="rmOpt('${cat.k}','${encodeURIComponent(v)}')">×</button></div>`).join('')||'<span style="color:#94a3b8;font-size:12px">暂无选项</span>'}
      </div>
      <div class="option-add-row">
        <input class="option-add-input" id="oinput-${cat.k}" placeholder="输入新选项（支持顿号分隔批量添加）">
        <button class="btn-add-opt" onclick="addOpts('${cat.k}')">添加</button>
      </div>
    </div>`;
  });
  document.getElementById('admin-opts-panel').innerHTML=h;
}

async function addOpts(cat) {
  const raw=document.getElementById(`oinput-${cat}`).value.trim();
  if(!raw) return;
  const vals=raw.includes('、')||raw.includes(',')? raw.split(/[、,，]/).map(s=>s.trim()).filter(Boolean) : [raw];
  showLoading();
  try {
    for(const v of vals){ if(!opts[cat].includes(v)) await api('POST','bj_options','',{category:cat,value:v,created_at:new Date().toISOString()}); }
    await loadOpts(); document.getElementById(`oinput-${cat}`).value='';
    showLoading(false);
    toast('添加成功','success'); renderOptsPanel();
  }catch(e){showLoading(false);toast('添加失败','error');}
}

async function rmOpt(cat, encodedVal) {
  const val=decodeURIComponent(encodedVal);
  if(!confirm(`确定删除"${val}"？`)) return;
  showLoading();
  try {
    const data=await api('GET','bj_options',`?category=eq.${cat}&value=eq.${encodeURIComponent(val)}`);
    if(data.length) await api('DELETE','bj_options',`?id=eq.${data[0].id}`);
    await loadOpts(); toast('已删除','success'); renderOptsPanel();
  }catch(e){showLoading(false);toast('删除失败','error');}
}

function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

// 渲染完成后绑定滚动事件，确保表头固定效果
var _origRenderCalendar = renderCalendar;
renderCalendar = function() {
  _origRenderCalendar();
  var cal = document.getElementById('calendar');
  if (cal) {
    cal.onscroll = function() {
      var hdr = cal.querySelector('.cal-header');
      if (hdr) {
        hdr.style.boxShadow = cal.scrollTop > 0 ? '0 2px 8px rgba(0,0,0,0.15)' : '';
      }
    };
  }
};

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m=>m.classList.add('hidden'));
  if(e.key==='Enter'&&!document.getElementById('auth-page').classList.contains('hidden')){
    if(!document.getElementById('login-form').classList.contains('hidden')) doLogin();
    else doRegister();
  }
});
</script>
